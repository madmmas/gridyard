<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Gridyard — web demo</title>
    <style>
      :root {
        --text-primary: #101014;
        --text-secondary: #52525b;
        --text-muted: #8b8b93;
        --border: #e4e4e7;
        --surface-0: #ffffff;
        --surface-1: #f4f4f5;
        --fill-accent: #378add;
        --on-accent: #ffffff;
        --radius: 8px;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        padding: 32px;
        font: 14px/1.4 -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial,
          sans-serif;
        color: var(--text-primary);
        background: var(--surface-0);
      }
      .wrap {
        max-width: 520px;
        margin: 0 auto;
      }
      .toolbar {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 10px 16px;
        margin-bottom: 16px;
        background: var(--surface-1);
        border: 0.5px solid var(--border);
        border-radius: var(--radius);
      }
      .badge {
        width: 26px;
        height: 26px;
        border-radius: 6px;
        background: var(--fill-accent);
        color: var(--on-accent);
        display: flex;
        align-items: center;
        justify-content: center;
        font-weight: 600;
        font-size: 13px;
      }
      .panel {
        border: 0.5px solid var(--border);
        border-radius: var(--radius);
        overflow: hidden;
      }
      .panel-header {
        padding: 6px 10px;
        font: 10px/1.4 ui-monospace, monospace;
        color: var(--text-muted);
        background: var(--surface-1);
        border-bottom: 0.5px solid var(--border);
      }
      .formula-bar {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 5px 10px;
        font: 11px/1.4 ui-monospace, monospace;
        color: var(--text-secondary);
        background: var(--surface-0);
        border-bottom: 0.5px solid var(--border);
      }
      .formula-bar .addr {
        color: var(--text-muted);
        min-width: 2.5em;
      }
      .formula-bar input {
        flex: 1;
        border: none;
        outline: none;
        background: transparent;
        font: inherit;
        color: var(--text-primary);
        min-width: 0;
      }
      .hint {
        margin-top: 12px;
        color: var(--text-secondary);
        font-size: 12px;
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="toolbar">
        <div class="badge">G</div>
        <strong>Gridyard</strong>
        <span style="color: var(--text-muted)">/</span>
        <span style="color: var(--text-secondary)">Loan review</span>
      </div>
      <div class="panel">
        <div class="panel-header">main · edit · ⌘/Ctrl+Z undo · ⌘/Ctrl+Shift+Z redo</div>
        <div class="formula-bar">
          <span class="addr" id="formula-addr">A1</span>
          <input
            id="formula-input"
            type="text"
            spellcheck="false"
            autocomplete="off"
            aria-label="Formula bar"
          />
        </div>
        <canvas id="grid" width="458" height="154" tabindex="0" aria-label="Loan review grid"></canvas>
      </div>
      <p class="hint" id="status">Loading WASM…</p>
      <p class="hint">
        Click a cell to select. Edit the formula bar — Enter commits (and moves), Escape
        cancels. Undo/redo with ⌘/Ctrl+Z and ⌘/Ctrl+Shift+Z (or Ctrl+Y). Invalid formulas
        render as red error cells.
      </p>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
