<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Gridyard — web demo</title>
    <style>
      :root {
        --text-primary: #101014;
        --text-secondary: #52525b;
        --text-muted: #8b8b93;
        --border: #e4e4e7;
        --surface-0: #ffffff;
        --surface-1: #f4f4f5;
        --fill-accent: #378add;
        --on-accent: #ffffff;
        --radius: 8px;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        padding: 32px;
        font: 14px/1.4 -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial,
          sans-serif;
        color: var(--text-primary);
        background: var(--surface-0);
      }
      .wrap {
        max-width: 640px;
        margin: 0 auto;
      }
      .toolbar {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 10px 16px;
        margin-bottom: 16px;
        background: var(--surface-1);
        border: 0.5px solid var(--border);
        border-radius: var(--radius);
      }
      .badge {
        width: 26px;
        height: 26px;
        border-radius: 6px;
        background: var(--fill-accent);
        color: var(--on-accent);
        display: flex;
        align-items: center;
        justify-content: center;
        font-weight: 600;
        font-size: 13px;
      }
      .panel {
        border: 0.5px solid var(--border);
        border-radius: var(--radius);
        overflow: hidden;
      }
      .panel + .panel {
        margin-top: 16px;
      }
      .panel-header {
        padding: 6px 10px;
        font: 10px/1.4 ui-monospace, monospace;
        color: var(--text-muted);
        background: var(--surface-1);
        border-bottom: 0.5px solid var(--border);
      }
      .formula-bar {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 5px 10px;
        font: 11px/1.4 ui-monospace, monospace;
        color: var(--text-secondary);
        background: var(--surface-0);
        border-bottom: 0.5px solid var(--border);
      }
      .formula-bar .addr {
        color: var(--text-muted);
        min-width: 2.5em;
      }
      .formula-bar input {
        flex: 1;
        border: none;
        outline: none;
        background: transparent;
        font: inherit;
        color: var(--text-primary);
        min-width: 0;
      }
      .hint {
        margin-top: 12px;
        color: var(--text-secondary);
        font-size: 12px;
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="toolbar">
        <div class="badge">G</div>
        <strong>Gridyard</strong>
        <span style="color: var(--text-muted)">/</span>
        <span style="color: var(--text-secondary)" id="workspace-title">Loan review</span>
      </div>
      <div class="panel">
        <div class="panel-header">main · loans</div>
        <div class="formula-bar">
          <span class="addr" id="main-formula-addr">A1</span>
          <input
            id="main-formula-input"
            type="text"
            spellcheck="false"
            autocomplete="off"
            aria-label="Main formula bar"
          />
        </div>
        <canvas id="main-grid" width="458" height="280" tabindex="0" aria-label="Main loan grid"></canvas>
      </div>
      <div class="panel">
        <div class="panel-header">bottom · Aggregate (columns synced from main)</div>
        <div class="formula-bar">
          <span class="addr" id="bottom-formula-addr">A1</span>
          <input
            id="bottom-formula-input"
            type="text"
            spellcheck="false"
            autocomplete="off"
            aria-label="Bottom Aggregate formula bar"
          />
        </div>
        <canvas
          id="bottom-grid"
          width="458"
          height="120"
          tabindex="0"
          aria-label="Bottom Aggregate grid"
        ></canvas>
      </div>
      <p class="hint" id="status">Loading workspace…</p>
      <p class="hint">
        Data loads from the mock server (<code>/loans</code> via Vite → :4000). Run
        <code>make up</code> alongside <code>make demo</code>. Bottom Aggregate uses
        <code>main!</code> formulas; edit Overdue in main and Aggregate updates.
      </p>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
