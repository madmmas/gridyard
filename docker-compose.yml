# Local development services for Gridyard.
# Start:  docker compose up --build
# Stop:   docker compose down

services:
  mock-server:
    build:
      context: ./apps/mock-server
    ports:
      - "4000:4000"
    volumes:
      # Live-edit fixtures without rebuilding the image.
      - ./apps/mock-server/db.json:/app/db.json
    environment:
      HOST: "0.0.0.0"
      PORT: "4000"
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:4000/loans').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 5s
